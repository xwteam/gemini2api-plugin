<!DOCTYPE html>
<html lang="zh-CN" data-page-title="popupTitle">
<head>
  <meta charset="UTF-8" />
  <title>Gemini Cookie</title>
  <style>
    body { width: 100%; min-width: 300px; box-sizing: border-box; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; margin: 0; background: #fff; color: #1f2329; }
    header { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 4px; justify-content: space-between; align-items: center; }
    header h1 { font-size: 14px; margin: 0; min-width: 0; flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header a { font-size: 12px; color: #1a73e8; text-decoration: none; cursor: pointer; flex-shrink: 0; }
    .section { padding: 12px 16px; }
    .acct { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 8px; background: #f7f8fa; margin-bottom: 8px; font-size: 13px; }
    .badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .active { background: #e6f4ea; color: #188038; }
    .expired { background: #fce8e6; color: #d93025; }
    .cookie { color: #8a8f99; font-size: 11px; margin-top: 2px; }
    .btns { display: flex; gap: 8px; margin-top: 4px; }
    button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .primary { background: #1a73e8; color: #fff; }
    .ghost { background: #eef1f4; color: #1f2329; }
    .log { max-height: 160px; overflow-y: auto; font-size: 11px; color: #5f6368; border-top: 1px solid #eee; }
    .log .line { padding: 5px 16px; border-bottom: 1px solid #f3f3f3; }
    .log .warn { color: #b06000; } .log .error { color: #d93025; } .log .success { color: #188038; }
    .empty { color: #8a8f99; font-size: 12px; text-align: center; padding: 8px; }
    .log-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-top: 1px solid #eee; font-size: 12px; color: #5f6368; background: #fafbfc; }
    .log-header a { color: #1a73e8; cursor: pointer; }
    .cookie-box { border-top: 1px solid #eee; }
    .cookie-box-head { display: flex; flex-wrap: wrap; gap: 4px; justify-content: space-between; align-items: center; padding: 8px 16px; font-size: 12px; color: #5f6368; background: #fafbfc; }
    .cookie-box-head > span:last-child { white-space: nowrap; }
    .cookie-box-head a { color: #1a73e8; cursor: pointer; margin-left: 10px; }
    #cookieBody { padding: 8px 16px; font-size: 12px; }
    .ck-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 4px 0; }
    .ck-name { color: #5f6368; flex-shrink: 0; }
    .ck-val { font-family: monospace; word-break: break-all; text-align: right; color: #1f2329; }
    .ck-ok { color: #188038; } .ck-miss { color: #d93025; }
    .ck-match { font-size: 11px; padding: 4px 0; }
    .bind-box { border-bottom: 1px solid #eee; background: #fafbfc; }
    .bind-box-head { padding: 8px 16px 4px; font-size: 12px; color: #5f6368; font-weight: 600; }
    .bind-row { display: flex; gap: 8px; padding: 0 16px 12px; align-items: center; }
    .bind-row input { flex: 1; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 8px; font-size: 13px; }
    .bind-row input:focus { outline: none; border-color: #1a73e8; }
    .bind-row button { flex: 0 0 auto; padding: 8px 14px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; background: #1a73e8; color: #fff; }
    .bind-hint { padding: 0 16px 10px; font-size: 11px; color: #8a8f99; line-height: 1.4; }
    .bind-msg { padding: 0 16px 8px; font-size: 11px; }
    .bind-msg.ok { color: #188038; } .bind-msg.err { color: #d93025; }
  </style>
</head>
<body>
  <header>
    <h1 data-i18n="popupTitle"></h1>
    <a id="openOptions" data-i18n="openOptions"></a>
  </header>
  <div class="bind-box">
    <div class="bind-box-head" data-i18n="bindBoxHead"></div>
    <div class="bind-row">
      <input id="accountId" type="text" data-i18n-placeholder="accountIdPlaceholder" data-i18n-title="accountIdTitle" />
      <button id="saveAccountId" type="button" data-i18n="saveAccountIdBtn"></button>
    </div>
    <div class="bind-hint" data-i18n="bindHint"></div>
    <div class="bind-msg" id="bindMsg"></div>
  </div>
  <div class="section" id="accounts"><div class="empty" data-i18n="loading"></div></div>
  <div class="section" style="padding-top:0">
    <div class="btns">
      <button class="primary" id="pollNow" data-i18n="pollNow"></button>
      <button class="ghost" id="refreshNow" data-i18n="refreshNow"></button>
    </div>
  </div>
  <div class="cookie-box">
    <div class="cookie-box-head">
      <span data-i18n="cookieBoxTitle"></span>
      <span>
        <a id="toggleCookie" data-i18n="toggleCookieShow" data-i18n-title="toggleCookieTitle" data-i18n-aria="toggleCookieTitle"></a>
        <a id="readCookie" data-i18n="readCookie" data-i18n-title="readCookieTitle" data-i18n-aria="readCookieTitle"></a>
      </span>
    </div>
    <div id="cookieBody"><div class="empty" data-i18n="cookieEmptyHint"></div></div>
  </div>
  <div class="log-header">
    <span data-i18n="logHeader"></span>
    <a id="clearLog" data-i18n="clearLog"></a>
  </div>
  <div class="log" id="log"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
